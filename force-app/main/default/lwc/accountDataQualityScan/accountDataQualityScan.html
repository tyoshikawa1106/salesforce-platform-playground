<template>
    <lightning-card
        icon-name="standard:account"
        title="取引先データ品質スキャン"
    >
        <div slot="actions" class="slds-button-group" role="group">
            <lightning-button-icon
                alternative-text="スキャン状態を更新"
                disabled={isRefreshDisabled}
                icon-name="utility:refresh"
                onclick={handleRefresh}
                title="スキャン状態を更新"
            ></lightning-button-icon>
            <lightning-button
                class="slds-m-left_x-small"
                disabled={isStartDisabled}
                label="スキャンを開始"
                onclick={handleStart}
                variant="brand"
            ></lightning-button>
        </div>

        <template lwc:if={isLoading}>
            <div class="slds-is-relative slds-p-around_large">
                <lightning-spinner
                    alternative-text="スキャン状態を読み込んでいます"
                    size="small"
                ></lightning-spinner>
            </div>
        </template>
        <template lwc:elseif={errorMessage}>
            <div
                class="slds-notify slds-notify_alert slds-alert_error slds-m-around_medium"
                role="alert"
            >
                <lightning-icon
                    alternative-text="エラー"
                    class="slds-m-right_x-small"
                    icon-name="utility:error"
                    size="x-small"
                    variant="inverse"
                ></lightning-icon>
                <span>{errorMessage}</span>
            </div>
        </template>
        <template lwc:elseif={hasScan}>
            <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                <div class="slds-grid slds-wrap slds-gutters_small">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                        <span class="slds-text-title">ステータス</span>
                        <p class="slds-text-heading_small">{viewModel.statusLabel}</p>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                        <span class="slds-text-title">開始日時</span>
                        <p>
                            <lightning-formatted-date-time
                                day="2-digit"
                                hour="2-digit"
                                minute="2-digit"
                                month="2-digit"
                                value={viewModel.startedAt}
                                year="numeric"
                            ></lightning-formatted-date-time>
                        </p>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                        <span class="slds-text-title">終了日時</span>
                        <p>
                            <lightning-formatted-date-time
                                day="2-digit"
                                hour="2-digit"
                                minute="2-digit"
                                month="2-digit"
                                value={viewModel.completedAt}
                                year="numeric"
                            ></lightning-formatted-date-time>
                        </p>
                    </div>
                </div>

                <div class="slds-m-top_medium">
                    <div class="slds-grid slds-grid_align-spread slds-m-bottom_xx-small">
                        <span>進捗</span>
                        <span>
                            <lightning-formatted-number value={viewModel.processedCount}></lightning-formatted-number>
                            / <lightning-formatted-number value={viewModel.totalCount}></lightning-formatted-number>
                            件（<lightning-formatted-number value={viewModel.progressPercent}></lightning-formatted-number>%）
                        </span>
                    </div>
                    <lightning-progress-bar value={viewModel.progressPercent}></lightning-progress-bar>
                </div>

                <div class="slds-grid slds-wrap slds-gutters_small slds-m-top_medium">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-5">
                        <article class="slds-box slds-box_x-small slds-text-align_center">
                            <span class="slds-text-title">電話番号なし</span>
                            <p class="slds-text-heading_medium">
                                <lightning-formatted-number value={viewModel.missingPhoneCount}></lightning-formatted-number>
                            </p>
                        </article>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-5">
                        <article class="slds-box slds-box_x-small slds-text-align_center">
                            <span class="slds-text-title">業種なし</span>
                            <p class="slds-text-heading_medium">
                                <lightning-formatted-number value={viewModel.missingIndustryCount}></lightning-formatted-number>
                            </p>
                        </article>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-5">
                        <article class="slds-box slds-box_x-small slds-text-align_center">
                            <span class="slds-text-title">請求先住所不足</span>
                            <p class="slds-text-heading_medium">
                                <lightning-formatted-number value={viewModel.missingAddressCount}></lightning-formatted-number>
                            </p>
                        </article>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-5">
                        <article class="slds-box slds-box_x-small slds-text-align_center">
                            <span class="slds-text-title">Webサイトなし</span>
                            <p class="slds-text-heading_medium">
                                <lightning-formatted-number value={viewModel.missingWebsiteCount}></lightning-formatted-number>
                            </p>
                        </article>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-5">
                        <article class="slds-box slds-box_x-small slds-text-align_center">
                            <span class="slds-text-title">取引先番号なし</span>
                            <p class="slds-text-heading_medium">
                                <lightning-formatted-number value={viewModel.missingAccountNumberCount}></lightning-formatted-number>
                            </p>
                        </article>
                    </div>
                </div>

                <template lwc:if={viewModel.hasError}>
                    <div class="slds-text-color_error slds-m-top_medium" role="alert">
                        {viewModel.errorMessage}
                    </div>
                </template>
            </div>
        </template>
        <template lwc:else>
            <p class="slds-p-around_medium">スキャン履歴はありません。「スキャンを開始」から実行してください。</p>
        </template>
    </lightning-card>
</template>
