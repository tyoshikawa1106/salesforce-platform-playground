<template>
    <lightning-card title="最近の問い合わせ" icon-name="standard:case">
        <template lwc:if={isLoadingCase}>
            <div class="slds-is-relative slds-p-around_medium">
                <lightning-spinner
                    alternative-text="関連する問い合わせを読み込み中"
                    size="small"
                ></lightning-spinner>
            </div>
        </template>

        <template lwc:elseif={caseErrorMessage}>
            <div
                class="slds-p-around_small slds-text-color_error"
                role="alert"
            >
                {caseErrorMessage}
            </div>
        </template>

        <template lwc:else>
            <div
                class="c-related-case-tabs slds-p-horizontal_medium slds-p-bottom_medium"
            >
                <lightning-tabset
                    variant="standard"
                    heading-label="関連する問い合わせケース"
                    heading-level="3"
                >
                    <lightning-tab label="顧客" value="contact">
                        <template lwc:if={isLoadingContactCases}>
                            <div
                                class="slds-is-relative slds-p-vertical_medium"
                            >
                                <lightning-spinner
                                    alternative-text="顧客の問い合わせを読み込み中"
                                    size="small"
                                ></lightning-spinner>
                            </div>
                        </template>
                        <template lwc:elseif={contactCasesHaveError}>
                            <div
                                class="slds-p-vertical_small slds-text-color_error"
                                role="alert"
                            >
                                顧客の問い合わせを読み込めませんでした。
                            </div>
                        </template>
                        <template lwc:elseif={hasContactCases}>
                            <ul class="slds-p-vertical_small">
                                <template
                                    for:each={contactCases}
                                    for:item="relatedCase"
                                >
                                    <li
                                        key={relatedCase.id}
                                        class="slds-box slds-box_x-small slds-m-bottom_x-small"
                                    >
                                        <div class="c-case-tile slds-tile">
                                            <h3
                                                class="slds-tile__title slds-truncate"
                                                title={relatedCase.caseNumber}
                                            >
                                                <template
                                                    lwc:if={relatedCase.hasUrl}
                                                >
                                                    <a
                                                        href={relatedCase.url}
                                                        target="_blank"
                                                        rel="noopener"
                                                        >{relatedCase.caseNumber}</a
                                                    >
                                                </template>
                                                <template lwc:else>
                                                    {relatedCase.caseNumber}
                                                </template>
                                            </h3>
                                            <div class="slds-tile__detail">
                                                <p>
                                                    {relatedCase.subject}
                                                </p>
                                                <p
                                                    class="slds-m-top_x-small slds-text-body_small slds-text-color_weak"
                                                >
                                                    <span>状況 </span>
                                                    {relatedCase.status}
                                                </p>
                                                <p
                                                    class="slds-text-body_small slds-text-color_weak"
                                                >
                                                    <span>原因 </span>
                                                    {relatedCase.reason}
                                                </p>
                                                <p
                                                    class="slds-text-body_small slds-text-color_weak"
                                                >
                                                    <span>オープン日 </span>
                                                    <lightning-formatted-date-time
                                                        value={relatedCase.createdDate}
                                                        year="numeric"
                                                        month="2-digit"
                                                        day="2-digit"
                                                        hour="2-digit"
                                                        minute="2-digit"
                                                    ></lightning-formatted-date-time>
                                                </p>
                                                <p
                                                    class="slds-text-body_small slds-text-color_weak"
                                                >
                                                    <span>取引先 </span>
                                                    {relatedCase.accountName}
                                                </p>
                                                <p
                                                    class="slds-text-body_small slds-text-color_weak"
                                                >
                                                    <span>取引先責任者 </span>
                                                    {relatedCase.contactName}
                                                </p>
                                            </div>
                                        </div>
                                    </li>
                                </template>
                            </ul>
                        </template>
                        <template lwc:else>
                            <p
                                class="slds-p-vertical_small slds-text-color_weak"
                            >
                                {contactEmptyMessage}
                            </p>
                        </template>
                    </lightning-tab>

                    <lightning-tab label="会社" value="account">
                        <template lwc:if={isLoadingAccountCases}>
                            <div
                                class="slds-is-relative slds-p-vertical_medium"
                            >
                                <lightning-spinner
                                    alternative-text="会社の問い合わせを読み込み中"
                                    size="small"
                                ></lightning-spinner>
                            </div>
                        </template>
                        <template lwc:elseif={accountCasesHaveError}>
                            <div
                                class="slds-p-vertical_small slds-text-color_error"
                                role="alert"
                            >
                                会社の問い合わせを読み込めませんでした。
                            </div>
                        </template>
                        <template lwc:elseif={hasAccountCases}>
                            <ul class="slds-p-vertical_small">
                                <template
                                    for:each={accountCases}
                                    for:item="relatedCase"
                                >
                                    <li
                                        key={relatedCase.id}
                                        class="slds-box slds-box_x-small slds-m-bottom_x-small"
                                    >
                                        <div class="c-case-tile slds-tile">
                                            <h3
                                                class="slds-tile__title slds-truncate"
                                                title={relatedCase.caseNumber}
                                            >
                                                <template
                                                    lwc:if={relatedCase.hasUrl}
                                                >
                                                    <a
                                                        href={relatedCase.url}
                                                        target="_blank"
                                                        rel="noopener"
                                                        >{relatedCase.caseNumber}</a
                                                    >
                                                </template>
                                                <template lwc:else>
                                                    {relatedCase.caseNumber}
                                                </template>
                                            </h3>
                                            <div class="slds-tile__detail">
                                                <p>
                                                    {relatedCase.subject}
                                                </p>
                                                <p
                                                    class="slds-m-top_x-small slds-text-body_small slds-text-color_weak"
                                                >
                                                    <span>状況 </span>
                                                    {relatedCase.status}
                                                </p>
                                                <p
                                                    class="slds-text-body_small slds-text-color_weak"
                                                >
                                                    <span>原因 </span>
                                                    {relatedCase.reason}
                                                </p>
                                                <p
                                                    class="slds-text-body_small slds-text-color_weak"
                                                >
                                                    <span>オープン日 </span>
                                                    <lightning-formatted-date-time
                                                        value={relatedCase.createdDate}
                                                        year="numeric"
                                                        month="2-digit"
                                                        day="2-digit"
                                                        hour="2-digit"
                                                        minute="2-digit"
                                                    ></lightning-formatted-date-time>
                                                </p>
                                                <p
                                                    class="slds-text-body_small slds-text-color_weak"
                                                >
                                                    <span>取引先 </span>
                                                    {relatedCase.accountName}
                                                </p>
                                                <p
                                                    class="slds-text-body_small slds-text-color_weak"
                                                >
                                                    <span>取引先責任者 </span>
                                                    {relatedCase.contactName}
                                                </p>
                                            </div>
                                        </div>
                                    </li>
                                </template>
                            </ul>
                        </template>
                        <template lwc:else>
                            <p
                                class="slds-p-vertical_small slds-text-color_weak"
                            >
                                {accountEmptyMessage}
                            </p>
                        </template>
                    </lightning-tab>
                </lightning-tabset>
            </div>
        </template>
    </lightning-card>
</template>
