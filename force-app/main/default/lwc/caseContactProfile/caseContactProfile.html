<template>
    <lightning-card
        icon-name="utility:profile_alt"
        aria-busy={isLoading}
        aria-label="取引先責任者プロフィール"
    >
        <h2 slot="title" class="slds-truncate" title={contactName}>
            <template lwc:if={contactRecordUrl}>
                <a
                    href={contactRecordUrl}
                    target="_blank"
                    rel="noopener"
                    >{contactName}</a
                >
            </template>
            <template lwc:else>{contactName}</template>
        </h2>
        <template lwc:if={isLoading}>
            <div
                class="c-customer-card slds-p-horizontal_medium slds-p-bottom_medium"
            >
                <lightning-spinner
                    alternative-text="取引先責任者のプロフィールを読み込んでいます"
                    size="small"
                ></lightning-spinner>
            </div>
        </template>

        <template lwc:elseif={errorMessage}>
            <p
                class="slds-p-horizontal_medium slds-p-bottom_medium slds-text-color_error"
                role="alert"
            >
                {errorMessage}
            </p>
        </template>

        <template lwc:else>
            <div
                class="c-customer-card__divider slds-border_top slds-m-horizontal_medium"
                aria-hidden="true"
            ></div>

            <dl
                class="c-customer-card__fields slds-p-horizontal_medium"
            >
                <div>
                    <dt class="slds-text-title">電話</dt>
                    <dd class="c-customer-card__value slds-m-top_x-small">
                        <template lwc:if={contactPhone}>
                            <lightning-formatted-phone
                                value={contactPhone}
                            ></lightning-formatted-phone>
                        </template>
                        <template lwc:else>{contactPhoneText}</template>
                    </dd>
                </div>
                <div>
                    <dt class="slds-text-title">メール</dt>
                    <dd class="c-customer-card__value slds-m-top_x-small">
                        <template lwc:if={contactEmail}>
                            <lightning-formatted-email
                                value={contactEmail}
                            ></lightning-formatted-email>
                        </template>
                        <template lwc:else>{contactEmailText}</template>
                    </dd>
                </div>
                <div>
                    <dt class="slds-text-title">携帯電話</dt>
                    <dd class="c-customer-card__value slds-m-top_x-small">
                        <template lwc:if={contactMobilePhone}>
                            <lightning-formatted-phone
                                value={contactMobilePhone}
                            ></lightning-formatted-phone>
                        </template>
                        <template lwc:else>{contactMobilePhoneText}</template>
                    </dd>
                </div>
                <div>
                    <dt class="slds-text-title">FAX</dt>
                    <dd class="c-customer-card__value slds-m-top_x-small">
                        <template lwc:if={contactFax}>
                            <lightning-formatted-phone
                                value={contactFax}
                            ></lightning-formatted-phone>
                        </template>
                        <template lwc:else>{contactFaxText}</template>
                    </dd>
                </div>
                <div>
                    <dt class="slds-text-title">部署</dt>
                    <dd class="c-customer-card__value slds-m-top_x-small">
                        {department}
                    </dd>
                </div>
                <div>
                    <dt class="slds-text-title">役職</dt>
                    <dd class="c-customer-card__value slds-m-top_x-small">
                        {title}
                    </dd>
                </div>
                <div
                    class="c-customer-card__field_full slds-border_top slds-p-top_medium"
                >
                    <dt class="slds-text-title">会社名</dt>
                    <dd class="c-customer-card__value slds-m-top_x-small">
                        <template lwc:if={accountRecordUrl}>
                            <a
                                href={accountRecordUrl}
                                target="_blank"
                                rel="noopener"
                                >{companyName}</a
                            >
                        </template>
                        <template lwc:else>{companyName}</template>
                    </dd>
                </div>
                <div class="c-customer-card__field_full">
                    <dt class="slds-text-title">WebサイトURL</dt>
                    <dd class="c-customer-card__value slds-m-top_x-small">
                        <template lwc:if={website}>
                            <lightning-formatted-url
                                label={website}
                                target="_blank"
                                value={website}
                            ></lightning-formatted-url>
                        </template>
                        <template lwc:else>{websiteText}</template>
                    </dd>
                </div>
            </dl>

            <div
                class="c-customer-card__divider slds-border_top slds-m-horizontal_medium"
                aria-hidden="true"
            ></div>

            <dl
                class="c-customer-card__fields slds-p-horizontal_medium slds-p-bottom_medium"
            >
                <div>
                    <dt class="slds-text-title">顧客の問い合わせ件数</dt>
                    <dd
                        class="c-customer-card__case-count c-customer-card__value slds-m-top_x-small"
                    >
                        <template lwc:if={hasContactCaseCount}>
                            <lightning-formatted-number
                                value={contactCaseCount}
                            ></lightning-formatted-number><template
                                lwc:if={contactCaseCountHasMore}
                            >+</template>
                        </template>
                        <template lwc:else>{contactCaseCountText}</template>
                    </dd>
                </div>
                <div>
                    <dt class="slds-text-title">会社の問い合わせ件数</dt>
                    <dd
                        class="c-customer-card__case-count c-customer-card__value slds-m-top_x-small"
                    >
                        <template lwc:if={hasAccountCaseCount}>
                            <lightning-formatted-number
                                value={accountCaseCount}
                            ></lightning-formatted-number><template
                                lwc:if={accountCaseCountHasMore}
                            >+</template>
                        </template>
                        <template lwc:else>{accountCaseCountText}</template>
                    </dd>
                </div>
            </dl>
        </template>
    </lightning-card>
</template>
