<template>
    <lightning-card title={cardTitle}>
        <lightning-button-icon
            slot="actions"
            alternative-text="再読み込み"
            disabled={isBusy}
            icon-name="utility:refresh"
            onclick={handleRefresh}
            title="再読み込み"
        ></lightning-button-icon>

        <div
            class="slds-p-bottom_medium"
            aria-busy={isBusy}
        >
            <template lwc:if={isBusy}>
                <lightning-spinner
                    alternative-text="メールメッセージを読み込んでいます"
                    size="small"
                ></lightning-spinner>
            </template>

            <template lwc:if={errorMessage}>
                <p
                    class="slds-p-vertical_medium slds-text-color_error"
                    role="alert"
                >
                    {errorMessage}
                </p>
            </template>

            <template lwc:elseif={hasEmailMessages}>
                <template lwc:if={loadMoreErrorMessage}>
                    <p
                        class="slds-p-bottom_small slds-text-color_error"
                        role="alert"
                    >
                        {loadMoreErrorMessage}
                    </p>
                </template>

                <ul
                    class="slds-timeline"
                    aria-label="メールメッセージの活動履歴"
                    role="list"
                >
                    <template
                        for:each={emailMessages}
                        for:item="emailMessage"
                    >
                        <template lwc:if={emailMessage.hasPageSeparator}>
                            <li
                                key={emailMessage.pageSeparatorId}
                                class="c-page-separator slds-p-vertical_small"
                                role="listitem"
                            >
                                <div
                                    class="slds-grid slds-grid_vertical-align-center"
                                    aria-label={emailMessage.pageSeparatorMessage}
                                    role="separator"
                                >
                                    <span
                                        class="c-page-separator__line slds-border_top"
                                        aria-hidden="true"
                                    ></span>
                                    <span
                                        class="slds-m-horizontal_small slds-text-body_small slds-text-color_weak"
                                        aria-live="polite"
                                        role="status"
                                    >
                                        {emailMessage.pageSeparatorMessage}
                                    </span>
                                    <span
                                        class="c-page-separator__line slds-border_top"
                                        aria-hidden="true"
                                    ></span>
                                </div>
                            </li>
                        </template>
                        <li
                            key={emailMessage.id}
                            aria-describedby={emailMessage.summaryId}
                            aria-labelledby={emailMessage.headingId}
                            role="listitem"
                        >
                            <div
                                class="c-timeline-item slds-timeline__item_expandable slds-timeline__item_email slds-is-open"
                            >
                                <span class="slds-assistive-text">
                                    {emailMessage.direction}メール
                                </span>
                                <div class="slds-media">
                                    <div class="slds-media__figure">
                                        <span
                                            class="slds-icon_container slds-icon-standard-email slds-timeline__icon slds-p-around_xxx-small"
                                        >
                                            <lightning-icon
                                                alternative-text={emailMessage.direction}
                                                icon-name={emailMessage.directionIconName}
                                                size="x-small"
                                                variant="inverse"
                                            ></lightning-icon>
                                        </span>
                                    </div>
                                    <div class="slds-media__body">
                                        <div
                                            class="slds-grid slds-grid_align-spread slds-timeline__trigger"
                                        >
                                            <div
                                                class="slds-grid slds-grid_vertical-align-center slds-truncate_container_75 slds-no-space"
                                            >
                                                <h3
                                                    id={emailMessage.headingId}
                                                    class="slds-truncate"
                                                    title={emailMessage.subject}
                                                >
                                                    <a
                                                        href={emailMessage.recordUrl}
                                                        rel="noopener"
                                                        target="_blank"
                                                    >
                                                        <strong>
                                                            {emailMessage.subject}
                                                        </strong>
                                                    </a>
                                                </h3>
                                            </div>
                                            <div
                                                class="slds-timeline__actions slds-timeline__actions_inline"
                                            >
                                                <p
                                                    class="slds-timeline__date"
                                                >
                                                    <lightning-formatted-date-time
                                                        value={emailMessage.messageDate}
                                                        year="numeric"
                                                        month="2-digit"
                                                        day="2-digit"
                                                        weekday="short"
                                                        hour="2-digit"
                                                        minute="2-digit"
                                                    ></lightning-formatted-date-time>
                                                </p>
                                            </div>
                                        </div>
                                        <p
                                            id={emailMessage.summaryId}
                                            class="slds-truncate slds-text-body_small slds-text-color_weak"
                                            title={emailMessage.summary}
                                        >
                                            <a href={emailMessage.fromAddressUrl}>
                                                {emailMessage.fromAddress}
                                            </a>
                                            <span
                                                class="slds-m-horizontal_xx-small"
                                            >
                                                から
                                            </span>
                                            <a href={emailMessage.toAddressUrl}>
                                                {emailMessage.toAddress}
                                            </a>
                                            <span class="slds-m-left_xx-small">
                                                への{emailMessage.direction}メール
                                            </span>
                                        </p>
                                        <article
                                            id={emailMessage.detailsId}
                                            class="slds-box slds-timeline__item_details slds-theme_shade slds-m-top_x-small"
                                        >
                                            <p
                                                class="c-email-body slds-scrollable_y slds-text-body_regular"
                                                style="line-height: 1.5; max-height: 30em"
                                            >
                                                {emailMessage.body}
                                            </p>
                                        </article>
                                    </div>
                                </div>
                            </div>
                        </li>
                    </template>
                </ul>

                <template lwc:if={hasNextPage}>
                    <div
                        class="slds-p-top_small slds-text-align_center"
                    >
                        <lightning-button
                            disabled={isBusy}
                            label="次のメールを読み込む"
                            onclick={handleLoadMore}
                        ></lightning-button>
                    </div>
                </template>
            </template>

            <template lwc:elseif={hasLoaded}>
                <p
                    class="slds-p-vertical_large slds-text-align_center slds-text-color_weak"
                >
                    このケースに紐づくメールメッセージはありません。
                </p>
            </template>
        </div>
    </lightning-card>
</template>
