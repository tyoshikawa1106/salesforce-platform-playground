engines:
    eslint:
        auto_discover_eslint_config: true
        disable_lwc_base_config: true
        disable_react_base_config: true
    pmd:
        custom_rulesets:
            - config/code-analyzer/pmd-ruleset.xml
rules:
    pmd:
        ApexDoc:
            tags:
                - Apex
                - Documentation
                - Upstream
        AvoidLogicInTrigger:
            tags:
                - Apex
                - BestPractices
                - Upstream
        ApexDocWithoutProperties:
            severity: 4
            tags:
                - Apex
                - Documentation
                - Recommended
        TriggerDelegatesToHandler:
            severity: 3
            tags:
                - Apex
                - BestPractices
                - Recommended
