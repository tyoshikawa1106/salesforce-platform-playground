version: 2

updates:
    - package-ecosystem: npm
      directory: '/'
      schedule:
          interval: weekly
          day: monday
          time: '09:00'
          timezone: 'Asia/Tokyo'
      open-pull-requests-limit: 5
      labels:
          - enhancement
          - area:testing
      commit-message:
          prefix: chore
          include: scope
      groups:
          npm-development:
              dependency-type: development
              patterns:
                  - '*'
