name: Apply project field

on:
  issues:
    types:
      - opened
      - reopened
      - transferred
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      target:
        description: Backfill target
        required: true
        default: all
        type: choice
        options:
          - open
          - all
      dry_run:
        description: Show targets without updating
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  issues: write
  pull-requests: read
  repository-projects: write

env:
  PROJECT_OWNER: ${{ vars.PLANNING_PROJECT_OWNER || github.repository_owner }}
  PROJECT_NUMBER: ${{ vars.PLANNING_PROJECT_NUMBER || '2' }}
  GH_TOKEN: ${{ secrets.PROJECTS_TOKEN || github.token }}

jobs:
  apply-current:
    name: Apply to current item
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Apply project
        env:
          CONTENT_ID: ${{ github.event.issue.node_id || github.event.pull_request.node_id }}
        run: |
          set -euo pipefail

          project_id="$(gh api graphql \
            -f query='query($login:String!,$number:Int!){ user(login:$login){ projectV2(number:$number){ id } } }' \
            -f login="$PROJECT_OWNER" \
            -F number="$PROJECT_NUMBER" \
            --jq '.data.user.projectV2.id')"

          if [ -z "$project_id" ] || [ "$project_id" = "null" ]; then
            echo "Project not found: $PROJECT_OWNER/$PROJECT_NUMBER" >&2
            exit 1
          fi

          gh api graphql \
            -f query='mutation($projectId:ID!,$contentId:ID!){ addProjectV2ItemById(input:{projectId:$projectId,contentId:$contentId}){ item{ id } } }' \
            -f projectId="$project_id" \
            -f contentId="$CONTENT_ID" \
            >/dev/null

  backfill:
    name: Backfill existing items
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Backfill project
        env:
          TARGET_STATE: ${{ inputs.target }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          project_id="$(gh api graphql \
            -f query='query($login:String!,$number:Int!){ user(login:$login){ projectV2(number:$number){ id } } }' \
            -f login="$PROJECT_OWNER" \
            -F number="$PROJECT_NUMBER" \
            --jq '.data.user.projectV2.id')"

          if [ -z "$project_id" ] || [ "$project_id" = "null" ]; then
            echo "Project not found: $PROJECT_OWNER/$PROJECT_NUMBER" >&2
            exit 1
          fi

          gh issue list \
            --state "$TARGET_STATE" \
            --limit 1000 \
            --json number,title,id \
            --jq '.[] | @base64' \
            | while read -r encoded; do
              item="$(printf '%s' "$encoded" | base64 -d)"
              number="$(printf '%s' "$item" | jq -r '.number')"
              content_id="$(printf '%s' "$item" | jq -r '.id')"
              title="$(printf '%s' "$item" | jq -r '.title')"

              echo "issue #$number: $title"
              if [ "$DRY_RUN" = "true" ]; then
                continue
              fi

              gh api graphql \
                -f query='mutation($projectId:ID!,$contentId:ID!){ addProjectV2ItemById(input:{projectId:$projectId,contentId:$contentId}){ item{ id } } }' \
                -f projectId="$project_id" \
                -f contentId="$content_id" \
                >/dev/null
            done

          gh pr list \
            --state "$TARGET_STATE" \
            --limit 1000 \
            --json number,title,id \
            --jq '.[] | @base64' \
            | while read -r encoded; do
              item="$(printf '%s' "$encoded" | base64 -d)"
              number="$(printf '%s' "$item" | jq -r '.number')"
              content_id="$(printf '%s' "$item" | jq -r '.id')"
              title="$(printf '%s' "$item" | jq -r '.title')"

              echo "pr #$number: $title"
              if [ "$DRY_RUN" = "true" ]; then
                continue
              fi

              gh api graphql \
                -f query='mutation($projectId:ID!,$contentId:ID!){ addProjectV2ItemById(input:{projectId:$projectId,contentId:$contentId}){ item{ id } } }' \
                -f projectId="$project_id" \
                -f contentId="$content_id" \
                >/dev/null
            done
