name: CI

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

permissions:
    contents: read

env:
    HUSKY: 0

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    npm:
        name: npm checks
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci --include=dev

            - name: Audit production dependencies
              run: npm audit --omit=dev

            - name: Check formatting
              run: npm run prettier:verify

            - name: Run lint
              run: npm run lint -- --no-error-on-unmatched-pattern

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 17

            - name: Install Salesforce CLI
              run: npm install --global @salesforce/cli

            - name: Install Salesforce Code Analyzer
              run: sf plugins install @salesforce/plugin-code-analyzer

            - name: Run Salesforce Code Analyzer
              run: npm run code-analyzer:ci

            - name: Check Salesforce validate secrets
              id: salesforce_validate
              env:
                  SF_JWT_CLIENT_ID: ${{ secrets.SF_JWT_CLIENT_ID }}
                  SF_JWT_USERNAME: ${{ secrets.SF_JWT_USERNAME }}
                  SF_JWT_PRIVATE_KEY: ${{ secrets.SF_JWT_PRIVATE_KEY }}
              run: |
                  if [ -n "$SF_JWT_CLIENT_ID" ] && [ -n "$SF_JWT_USERNAME" ] && [ -n "$SF_JWT_PRIVATE_KEY" ]; then
                    echo "enabled=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "enabled=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Skip Salesforce validate
              if: steps.salesforce_validate.outputs.enabled != 'true'
              run: echo "Salesforce validate skipped because JWT auth secrets are not configured."

            - name: Login to Salesforce
              if: steps.salesforce_validate.outputs.enabled == 'true'
              env:
                  SF_JWT_CLIENT_ID: ${{ secrets.SF_JWT_CLIENT_ID }}
                  SF_JWT_USERNAME: ${{ secrets.SF_JWT_USERNAME }}
                  SF_JWT_PRIVATE_KEY: ${{ secrets.SF_JWT_PRIVATE_KEY }}
                  SF_LOGIN_URL: ${{ secrets.SF_LOGIN_URL }}
              run: |
                  umask 077
                  printf '%s' "$SF_JWT_PRIVATE_KEY" > "$RUNNER_TEMP/server.key"
                  sf org login jwt \
                    --client-id "$SF_JWT_CLIENT_ID" \
                    --username "$SF_JWT_USERNAME" \
                    --jwt-key-file "$RUNNER_TEMP/server.key" \
                    --instance-url "${SF_LOGIN_URL:-https://login.salesforce.com}" \
                    --alias ci-dev

            - name: Validate Salesforce metadata
              if: steps.salesforce_validate.outputs.enabled == 'true'
              run: npm run sf:validate:dev -- --target-org ci-dev

            - name: Remove Salesforce JWT key
              if: always() && steps.salesforce_validate.outputs.enabled == 'true'
              run: rm -f "$RUNNER_TEMP/server.key"

            - name: Run LWC unit tests
              run: npm run test:unit -- -- --runInBand --passWithNoTests
