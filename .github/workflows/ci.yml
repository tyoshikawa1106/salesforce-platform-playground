name: CI

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

permissions:
    contents: read

env:
    HUSKY: 0

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    npm:
        name: npm checks
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci --include=dev

            - name: Audit dependencies
              run: npm audit --audit-level=high

            - name: Check formatting
              run: npm run prettier:verify

            - name: Check docs
              run: npm run docs:check

            - name: Run lint
              run: npm run lint -- --no-error-on-unmatched-pattern

            - name: Run SLDS Linter
              run: npm run lint:slds

            - name: Setup Java
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: 17

            - name: Install Salesforce CLI
              run: npm install --global @salesforce/cli

            - name: Install Salesforce Code Analyzer
              run: sf plugins install @salesforce/plugin-code-analyzer

            - name: Run Salesforce Code Analyzer
              run: npm run code-analyzer:ci

            - name: Run script unit tests
              run: npm run test:scripts

            - name: Run LWC unit tests
              run: npm run test:unit -- -- --runInBand --passWithNoTests
